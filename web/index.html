<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AthenGPT</title>
<meta name="description" content="AthenGPT — ein from-scratch LLM live im Browser. Cadmus (Tokenizer) → Hephaistos (Training) → Talos (wasm-Inferenz).">
<link rel="icon" type="image/png" href="https://tsuskov.github.io/favicon.png">
<meta property="og:title" content="AthenGPT">
<meta property="og:type" content="website">
<meta property="og:url" content="https://tsuskov.github.io/talos-forge/">
<meta property="og:description" content="Ein from-scratch LLM live im Browser — Cadmus → Hephaistos → Talos, als wasm.">
<style>
  :root {
    color-scheme: light;
    /* Designsprache von tsuskov.github.io: zinc-Palette, Punktraster,
       schwarzer Akzent, GitHub-Grün als einzige Farbe, Emil-Kurven. */
    --bg: #fafafa;
    --surface: #ffffff;
    --line: rgba(0, 0, 0, 0.08);
    --line-strong: rgba(0, 0, 0, 0.14);
    --text: #18181b;
    --dim: #71717a;
    --faint: #a1a1aa;
    --accent: #18181b;
    --hover: #f4f4f5;
    --green: #30a14e;
    --green-bright: #40c463;
    --green-track: #ebedf0;
    --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
    --ease-in-out: cubic-bezier(0.77, 0, 0.175, 1);
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--bg);
    /* hauchzartes Punktraster wie auf der Profilseite */
    background-image: radial-gradient(rgba(0, 0, 0, 0.035) 1px, transparent 1px);
    background-size: 22px 22px;
    color: var(--text);
    font: 15px/1.5 var(--font);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    /* Rhythmus der Profilseite: kompakt auf Mobile, luftig ab 600px */
    padding: 56px 20px 56px;
  }
  @media (min-width: 600px) {
    body { padding: 88px 22px 72px; }
  }
  /* Tastatur-Hinweise sind auf Touch-Geräten bedeutungslos */
  @media (hover: none) {
    kbd { display: none; }
  }

  .wrap { max-width: 640px; margin: 0 auto; }

  /* ── Entrance beim Laden: einmalig, gestaffelt ────────── */
  .art, header, #loader, #composer {
    opacity: 1;
    transform: translateY(0);
    transition: opacity 500ms var(--ease-out), transform 500ms var(--ease-out);
    @starting-style { opacity: 0; transform: translateY(8px); }
  }
  header { transition-delay: 50ms; }
  #loader, #composer { transition-delay: 110ms; }

  /* ── Emblem: das Fresko als Contribution-Graph ─────────── */
  .art {
    display: flex;
    justify-content: center;
    margin-bottom: 26px;
  }
  #artGrid {
    width: min(300px, 74%);
    display: grid;
    grid-template-columns: repeat(40, 1fr);
    gap: 1px;
    aspect-ratio: 40 / 55;
    user-select: none;
  }
  #artGrid .acell {
    border-radius: 20%;
    /* Reveal-Welle von links nach rechts wie der Contribution-Graph
       der Profilseite; Delay pro Spalte wird in JS gesetzt */
    animation: cellIn 380ms var(--ease-out) backwards;
    animation-delay: var(--cell-delay, 0ms);
  }
  @keyframes cellIn {
    from { opacity: 0; transform: scale(0.6); }
    to   { opacity: 1; transform: scale(1); }
  }
  #artGrid .l0 { background: var(--green-track); }
  #artGrid .l1 { background: #9be9a8; }
  #artGrid .l2 { background: var(--green-bright); }
  #artGrid .l3 { background: var(--green); }
  #artGrid .l4 { background: #216e39; }
  @media (hover: hover) and (pointer: fine) {
    #artGrid .acell {
      transition: transform 140ms var(--ease-out), box-shadow 140ms var(--ease-out);
    }
    #artGrid .acell:hover {
      transform: scale(1.8);
      border-radius: 28%;
      z-index: 2;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.22);
    }
  }

  /* ── Kopf ─────────────────────────────────────────────── */
  header { text-align: center; margin-bottom: 40px; }

  h1 {
    font-size: 30px;
    font-weight: 650;
    letter-spacing: -0.02em;
    cursor: default;
  }
  @media (min-width: 600px) {
    h1 { font-size: 38px; }
  }

  /* Signature der Profilseite: Farbschimmer beim Hovern des Titels */
  @media (hover: hover) and (pointer: fine) {
    h1:hover {
      background: linear-gradient(110deg, var(--text) 30%, #6366f1 50%, var(--text) 70%);
      background-size: 220% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 900ms var(--ease-in-out);
    }
  }
  @keyframes shimmer {
    from { background-position: 120% 0; }
    to   { background-position: -120% 0; }
  }

  .chips {
    display: flex;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
    margin-top: 10px;
    font-size: 12.5px;
    color: var(--faint);
    letter-spacing: 0.01em;
    min-height: 1.2em;
  }
  /* Q4_0↔F32-Wechsel, als unterstrichener Link wie auf der Profilseite */
  #swapBtn {
    font: 12.5px var(--font);
    border: none;
    background: none;
    color: var(--dim);
    cursor: pointer;
    padding: 0 0 1px;
    border-bottom: 1px solid var(--line-strong);
    border-radius: 0;
    transition: color 160ms var(--ease-out), border-color 160ms var(--ease-out);
  }
  @media (hover: hover) and (pointer: fine) {
    #swapBtn:hover { color: var(--text); border-color: var(--text); }
  }

  /* ── Ladephase: schmale Leiste in Contribution-Grün ───── */
  #loader { text-align: center; padding: 8px 0; }
  #loader .phase { color: var(--dim); font-size: 13px; }
  #loader .bar {
    width: min(300px, 76%);
    height: 4px;
    margin: 16px auto 0;
    background: var(--green-track);
    border-radius: 999px;
    overflow: hidden;
  }
  #loader .bar i {
    display: block;
    height: 100%;
    width: 100%;
    background: var(--green);
    border-radius: inherit;
    /* scaleX statt width: läuft auf der GPU, kein Layout pro Chunk */
    transform: scaleX(0);
    transform-origin: left center;
    transition: transform 200ms var(--ease-out);
  }

  /* ── Composer: die eine Karte ─────────────────────────── */
  #composer {
    display: none;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    transition: border-color 180ms var(--ease-out), box-shadow 180ms var(--ease-out);
  }
  #composer.on { display: block; }
  #composer:focus-within {
    border-color: var(--line-strong);
    box-shadow: 0 10px 28px rgba(0, 0, 0, 0.10);
  }

  textarea {
    display: block;
    width: 100%;
    height: 52px;      /* eine Zeile; wächst per JS mit dem Inhalt */
    max-height: 280px;
    overflow-y: auto;
    resize: none;
    background: transparent;
    color: var(--text);
    border: none;
    padding: 16px 20px 4px;
    font: 15px/1.55 var(--font);
    outline: none;
  }
  textarea::placeholder { color: var(--faint); }

  .composer-row {
    display: flex;
    align-items: center;
    gap: 2px;
    flex-wrap: wrap;
    padding: 8px 10px 10px 14px;
  }

  .field {
    display: flex;
    align-items: baseline;
    gap: 5px;
    padding: 4px 7px;
    border-radius: 7px;
    transition: background-color 150ms ease;
  }
  @media (hover: hover) and (pointer: fine) {
    .field:hover { background: var(--hover); }
  }
  .field label { font-size: 11.5px; color: var(--faint); }
  .field input {
    width: 5.5ch;
    background: transparent;
    color: var(--dim);
    border: none;
    font: 12.5px var(--font);
    font-variant-numeric: tabular-nums;
    outline: none;
  }
  .field input:focus { color: var(--text); }
  .field input::placeholder { color: var(--faint); }
  .field input::-webkit-outer-spin-button,
  .field input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .spacer { flex: 1; }

  /* Primärknopf: morpht Schmieden ↔ Stopp; schwarz wie der Start-Button
     der Profilseite, mit Lift beim Hovern */
  #forgeBtn {
    font: 13.5px var(--font);
    font-weight: 600;
    border: none;
    border-radius: 11px;
    padding: 8px 18px;
    cursor: pointer;
    background: var(--accent);
    color: var(--surface);
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.16);
    transition: transform 140ms var(--ease-out), box-shadow 180ms var(--ease-out),
      background-color 180ms ease;
  }
  #forgeBtn:active { transform: scale(0.96); }
  #forgeBtn.stop { background: #52525b; }
  @media (hover: hover) and (pointer: fine) {
    #forgeBtn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.20);
    }
    #forgeBtn.stop:hover { background: #3f3f46; }
  }
  #forgeBtn kbd { font: 10.5px var(--font); opacity: 0.6; margin-left: 6px; }

  /* ── Ergebnis: erscheint erst, wenn es etwas gibt ─────── */
  #result {
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 350ms var(--ease-out), transform 350ms var(--ease-out);
    margin-top: 34px;
    display: none;
  }
  #result.on { display: block; }
  #result.in { opacity: 1; transform: none; }

  #anvil {
    white-space: pre-wrap;
    word-break: break-word;
    font: 13.5px/1.7 var(--mono);
    padding: 0 4px;
  }
  #anvil .prompt { color: var(--faint); }
  #anvil .gen { color: var(--text); }
  /* Prefill-Fortschritt: der schon eingespeiste Teil des Prompts glüht auf */
  #echoHot { color: var(--dim); }

  .cursor {
    display: none;
    width: 0.55em;
    height: 1.05em;
    margin-left: 1px;
    vertical-align: text-bottom;
    background: var(--green);
    border-radius: 1px;
    animation: blink 1.06s steps(2, start) infinite;
  }
  .forging .cursor { display: inline-block; }
  @keyframes blink { to { visibility: hidden; } }

  .result-foot {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-top: 14px;
    padding: 0 4px;
    font-size: 12px;
    color: var(--faint);
  }
  .result-foot.err { color: #c0392b; }

  #againBtn {
    display: none;
    opacity: 0;
    font: 12px var(--font);
    border: none;
    background: none;
    color: var(--dim);
    cursor: pointer;
    padding: 0 0 1px;
    border-bottom: 1px solid var(--line-strong);
    /* display diskret mitanimieren, damit der Link ein- und ausfadet
       statt zu ploppen */
    transition: color 160ms var(--ease-out), border-color 160ms var(--ease-out),
      opacity 160ms ease, display 160ms allow-discrete;
  }
  #againBtn.on {
    display: inline;
    opacity: 1;
    @starting-style { opacity: 0; }
  }
  @media (hover: hover) and (pointer: fine) {
    #againBtn:hover { color: var(--text); border-color: var(--text); }
  }

  footer {
    margin-top: 64px;
    text-align: center;
    font-size: 12px;
    color: var(--faint);
  }
  footer b { color: var(--dim); font-weight: 500; }
  footer a {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px solid var(--line-strong);
    padding-bottom: 1px;
    transition: color 160ms var(--ease-out), border-color 160ms var(--ease-out);
  }
  footer a:hover { color: var(--text); border-color: var(--text); }

  @media (prefers-reduced-motion: reduce) {
    .art, header, #loader, #composer { transition: opacity 200ms ease; transform: none; }
    #result { transition: opacity 200ms ease; transform: none; }
    .cursor { animation: none; }
    h1:hover { animation: none; }
    #forgeBtn:active, #forgeBtn:hover { transform: none; }
    #artGrid .acell { animation: none; }
    #artGrid .acell:hover { transform: scale(1.3); }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="art"><div id="artGrid" role="img" aria-label="Platon und Aristoteles aus Raffaels Schule von Athen — gerastert als GitHub-Contribution-Graph"></div></div>

  <header>
    <h1>AthenGPT</h1>
    <div class="chips" id="chips"></div>
  </header>

  <div id="loader">
    <div class="phase" id="phase">Der Ofen heizt auf …</div>
    <div class="bar"><i id="barFill"></i></div>
  </div>

  <div id="composer">
    <textarea id="prompt" rows="1" spellcheck="false" placeholder="Schreib einen Anfang …"></textarea>
    <div class="composer-row">
      <div class="field"><label for="n">Tokens</label><input id="n" type="number" value="128" min="1" max="240"></div>
      <div class="field"><label for="temp">Temp</label><input id="temp" type="number" value="0.8" min="0" max="2" step="0.05"></div>
      <div class="field"><label for="topk">Top-k</label><input id="topk" type="number" placeholder="aus" min="1"></div>
      <div class="field"><label for="topp">Top-p</label><input id="topp" type="number" placeholder="aus" min="0" max="1" step="0.05"></div>
      <div class="field"><label for="seed">Seed</label><input id="seed" type="number" placeholder="zufällig" min="0"></div>
      <div class="spacer"></div>
      <button id="forgeBtn">Schmieden<kbd>⌘⏎</kbd></button>
    </div>
  </div>

  <div id="result">
    <div id="anvil"><span class="prompt" id="echo"><span id="echoHot"></span><span id="echoCold"></span></span><span class="gen" id="gen"></span><span class="cursor"></span></div>
    <div class="result-foot"><span id="stats"></span><button id="againBtn">Weiterschmieden</button></div>
  </div>

  <footer>
    <p><b>Cadmus</b> (Tokenizer) → <b>Hephaistos</b> (Training) → <b>Talos</b> (Inferenz) · WebAssembly · alles lokal, nichts verlässt deinen Rechner</p>
    <p style="margin-top: 8px"><a href="https://github.com/Tsuskov/talos-forge">github.com/Tsuskov/talos-forge</a> · <a href="https://tsuskov.github.io/">tsuskov.github.io</a></p>
  </footer>
</div>

<script type="module">
  const $ = (id) => document.getElementById(id);

  // Das Fresko als Contribution-Graph: 40 x 55 Zellen, Level 0-4,
  // generiert aus art/platon_aristoteles_green.png (Block-Modus je Zelle).
  const ART_COLS = 40;
  const ART =
    '0003330000000000000000000000000003430003000340000000000000000000000000000043000000033000000000000000000000000000003300000000300000000000000000000000000000330002000330000000000000000000000000000003000000030000000000000000000000000000000320000003300000000000000000000444400000332000000230000044130000000000444444000023200100033000044423300000000044344400000320231003000004444440000000000444444000033014004330000444344000000000044444400002302421433000444434400000000044443400000343244344400044443230000000003444330000044444444440044444333110000033334434320003444444444034444433311100033333343342200234444441443344443441111132333333444233033444444133344444444111143443333334333333344444421434444444431114433434333333333334443444243443443443211433444333312333334444334444444433344331134444432333333334444444444444443344443114444443233332233444444444444444334444311444444423333333333444444444444443344442144444444133333333344444444444444334444411444444441333333333444444444444444444442244444444444444443344434444441444114444323444444444444444244444444444134113444444344444444444444424444444444432001344444444444444444444442444344444443330124444343444444444444444344434444444433033444444444434444444444444444444444444430444444444444444444444444444444444444444444444444444444444444444244444444444444334344444444444444444444224444444404444332333444344443344444443322444434442444422433344402444344444444332244443444344443443134443344434434344432234444344434444444322444334444343344444333444334430444444233344333444444334444433344443442044444433434443334344434444444320444444334444443343444334343443444444430044444430444444444444433344344444444443004444440044444444444432224434444444444300444444004444444444442323343444444444420044444402344444444444323344344444444443004444443334444444444431334434444444444400444443210444444444430003234444444444444044444110044444444440000014444444444444434444440004444444440000000444444444444423444440021444444440000000044444444444443344000000014444444422222224444444444444344433232020444444444433333444444444444323444444444444444444444444444444444444443344444444444444444444444444444444444444444423333301334443000000000233444333444444440022300000000000000000000000000000344444';
  ART.split('').forEach((ch, i) => {
    const cell = document.createElement('div');
    cell.className = 'acell l' + ch;
    cell.style.setProperty('--cell-delay', `${(i % ART_COLS) * 13}ms`);
    $('artGrid').appendChild(cell);
  });
  const MODELS = {
    q4: { file: 'hephaistos_q4.gguf', label: 'Q4_0' },
    f32: { file: 'hephaistos.gguf', label: 'F32' },
  };
  let variant = 'q4';
  let modelMB = 0;
  const other = (v) => (v === 'q4' ? 'f32' : 'q4');

  const worker = new Worker('./worker.js', { type: 'module' });
  let forging = false;
  let lastSeed = null;

  // Prompt-Echo mit Prefill-Tint: der eingespeiste Anteil (frac 0…1) glüht
  // auf, nach dem Lauf kühlt alles wieder auf faint ab.
  let echoText = '';
  function setEchoTint(frac) {
    const cut = Math.round(echoText.length * frac);
    $('echoHot').textContent = echoText.slice(0, cut);
    $('echoCold').textContent = echoText.slice(cut);
  }

  // Chatbar wächst und schrumpft mit dem Inhalt (52px … 280px)
  const promptEl = $('prompt');
  const growPrompt = () => {
    promptEl.style.height = '52px';
    promptEl.style.height = Math.min(promptEl.scrollHeight, 280) + 'px';
  };
  promptEl.addEventListener('input', growPrompt);

  // ── Modell holen, mit Fortschritt; auch für den Q4_0↔F32-Wechsel ──
  async function loadModel(v) {
    variant = v;
    $('composer').classList.remove('on');
    $('loader').style.display = '';
    $('barFill').style.transform = 'scaleX(0)';
    $('phase').textContent = 'Der Ofen heizt auf …';
    const MODEL = MODELS[v].file;
    try {
      const res = await fetch('./' + MODEL);
      if (!res.ok) throw new Error(`${MODEL}: HTTP ${res.status}`);
      const total = +res.headers.get('Content-Length') || 0;
      const reader = res.body.getReader();
      const parts = [];
      let got = 0;
      for (;;) {
        const { done, value } = await reader.read();
        if (done) break;
        parts.push(value);
        got += value.length;
        if (total) {
          $('barFill').style.transform = `scaleX(${(got / total).toFixed(3)})`;
          $('phase').textContent = `Der Ofen heizt auf … ${(got / 1048576).toFixed(0)} / ${(total / 1048576).toFixed(0)} MB`;
        } else {
          $('phase').textContent = `Der Ofen heizt auf … ${(got / 1048576).toFixed(0)} MB`;
        }
      }
      const bytes = new Uint8Array(got);
      let off = 0;
      for (const p of parts) { bytes.set(p, off); off += p.length; }
      modelMB = got / 1048576;
      $('phase').textContent = 'Talos erwacht …';
      worker.postMessage({ type: 'load', bytes: bytes.buffer }, [bytes.buffer]);
    } catch (err) {
      $('phase').textContent = 'Der Ofen bleibt kalt: ' + err.message;
    }
  }
  loadModel(variant);

  // ── Worker-Ereignisse ──
  worker.onmessage = (e) => {
    const m = e.data;
    if (m.type === 'ready') {
      $('loader').style.display = 'none';
      $('chips').innerHTML =
        `<span>${m.info.n_layer} Layer</span><span>${m.info.n_embd} dim</span>` +
        `<span>${m.info.vocab_size} Vocab</span><span>${m.info.context_length} Kontext</span>` +
        `<span>${MODELS[variant].label} · ${modelMB.toFixed(1)} MB</span>` +
        `<button id="swapBtn">${MODELS[other(variant)].label} laden</button>`;
      $('swapBtn').addEventListener('click', () => {
        if (!forging) loadModel(other(variant));
      });
      $('composer').classList.add('on');
      $('prompt').focus();
    } else if (m.type === 'prefill') {
      setEchoTint(m.total ? m.done / m.total : 1);
    } else if (m.type === 'chunk') {
      $('gen').textContent += m.text;
    } else if (m.type === 'done') {
      forging = false;
      $('anvil').classList.remove('forging');
      setEchoTint(0);
      setControls();
      if (!m.stopped) {
        const tps = m.tokens && m.secs ? (m.tokens / m.secs).toFixed(0) : '–';
        $('stats').textContent =
          `${m.tokens} Tokens · ${m.secs.toFixed(2)} s · ${tps} tok/s` +
          (m.promptTokens ? ` · Prefill ${m.prefillSecs.toFixed(2)} s` : '') +
          ` · Seed ${lastSeed}`;
      } else {
        $('stats').textContent = `Gestoppt · Seed ${lastSeed}`;
      }
    } else if (m.type === 'error') {
      forging = false;
      $('anvil').classList.remove('forging');
      setEchoTint(0);
      setControls();
      document.querySelector('.result-foot').classList.add('err');
      $('stats').textContent = m.error;
    }
  };

  const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)');

  function setControls() {
    const btn = $('forgeBtn');
    // Blur maskiert den Label-Wechsel: aus zwei harten Zuständen wird
    // eine Verwandlung. Nur beim echten Umschalten, nicht bei jedem Aufruf.
    if (btn.classList.contains('stop') !== forging && !reduceMotion.matches) {
      btn.animate(
        [{ filter: 'blur(2px)', opacity: 0.7 }, { filter: 'blur(0px)', opacity: 1 }],
        { duration: 180, easing: 'ease' }
      );
    }
    if (forging) {
      btn.classList.add('stop');
      btn.innerHTML = 'Stopp<kbd>esc</kbd>';
    } else {
      btn.classList.remove('stop');
      btn.innerHTML = 'Schmieden<kbd>⌘⏎</kbd>';
    }
    $('againBtn').classList.toggle('on', !forging && !!$('gen').textContent);
  }

  function params() {
    return {
      n: Math.max(1, +$('n').value || 128),
      temp: Math.max(0, +$('temp').value || 0),
      top_k: $('topk').value !== '' ? +$('topk').value : undefined,
      top_p: $('topp').value !== '' ? +$('topp').value : undefined,
    };
  }

  function beginRun() {
    forging = true;
    document.querySelector('.result-foot').classList.remove('err');
    $('stats').textContent = '';
    $('anvil').classList.add('forging');
    setControls();
  }

  function forge() {
    if (forging) return;
    const prompt = $('prompt').value;
    if (!prompt.trim()) { $('prompt').focus(); return; }
    lastSeed = $('seed').value !== '' ? +$('seed').value : Math.floor(Math.random() * 2 ** 32);
    beginRun();
    echoText = prompt;
    setEchoTint(0);
    $('gen').textContent = '';
    const result = $('result');
    result.classList.add('on');
    requestAnimationFrame(() => result.classList.add('in'));
    worker.postMessage({ type: 'generate', prompt, seed: lastSeed, ...params() });
  }

  // Setzt die Session im Worker fort — KV-Cache bleibt, kein Re-Prefill.
  // prompt + seed braucht nur der Fallback, falls die Session weg ist.
  function continueForge() {
    if (forging) return;
    beginRun();
    worker.postMessage({
      type: 'continue',
      prompt: $('echo').textContent + $('gen').textContent,
      seed: lastSeed ?? Math.floor(Math.random() * 2 ** 32),
      ...params(),
    });
  }

  function stop() {
    if (forging) worker.postMessage({ type: 'stop' });
  }

  $('forgeBtn').addEventListener('click', () => (forging ? stop() : forge()));
  $('againBtn').addEventListener('click', continueForge);
  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); forge(); }
    if (e.key === 'Escape') stop();
  });
</script>
</body>
</html>
